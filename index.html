<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Pelagia</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    :root {
      --page-bg: #10121b;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Pelagia bullet-dodge prototype"></canvas>

  <!-- classic script(非module)で読み込む: file://で直接開いても動かすため -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pool.js"></script>
  <script src="js/viewport.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/player.js"></script>
  <script src="js/bullets.js"></script>
  <script src="js/enemyBullets.js"></script>
  <script src="js/enemyLasers.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/boss.js"></script>
  <script src="js/stageRunner.js"></script>
  <script src="js/stage1.js"></script>
  <script src="js/stage2.js"></script>
  <script src="js/stage3.js"></script>
  <script src="js/stageRegistry.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ending.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
</body>
</html>

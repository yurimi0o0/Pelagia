<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Pelagia Phase 0+1</title>
  <style>
    :root {
      --page-bg: #10121b;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Pelagia bullet-dodge prototype"></canvas>

  <script>
    "use strict";

    const CONFIG = {
      world: {
        width: 360,
        height: 640,
      },
      colors: {
        pageBackground: "#10121b",
        outerFill: "#161827",
        fieldTop: "#12213a",
        fieldBottom: "#050814",
        fieldBorder: "rgba(210, 225, 255, 0.18)",
        hitFill: "rgba(255, 80, 160, 0.95)",
        hitStroke: "rgba(255, 255, 255, 0.9)",
        sway: "rgba(148, 205, 255, 0.42)",
        swayAccent: "rgba(194, 170, 255, 0.35)",
      },
      player: {
        spriteWidth: 64,
        spriteHeight: 112,
        startX: 180,
        startY: 500,
        pointerOffsetY: 88,
        followStrength: 14,
        maxTiltRad: 0.18,
        tiltResponsiveness: 10,
        tiltFromVelocity: 0.018,
        swayStrength: 0.24,
        swayResponsiveness: 8,
        hitRadius: 5,
        hitOffsetX: 0,
        hitOffsetY: -16,
      },
      debug: {
        showHitCircle: true,
      },
    };

    // 本番のクラゲ少女透過PNGをbase64化して、この文字列だけ差し替えてください。
    // いまは1x1透過PNGなので、PLAYER_SPRITE_IS_PLACEHOLDERがtrueの間は代替キャラを描画します。
    const PLAYER_SPRITE_SRC = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII=";
    const PLAYER_SPRITE_IS_PLACEHOLDER = true;

    const PLAYER_SPRITES = {
      jellyGirl: {
        src: PLAYER_SPRITE_SRC,
        isPlaceholder: PLAYER_SPRITE_IS_PLACEHOLDER,
      },
      // red: { src: "data:image/png;base64,...", isPlaceholder: false },
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const assets = {
      playerImage: null,
      playerImageReady: false,
      playerImageFailed: false,
    };

    const viewport = {
      dpr: 1,
      cssWidth: 0,
      cssHeight: 0,
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      viewWidth: 0,
      viewHeight: 0,
    };

    const input = {
      isDown: false,
      pointerId: null,
      worldX: CONFIG.player.startX,
      worldY: CONFIG.player.startY,
    };

    const player = {
      x: CONFIG.player.startX,
      y: CONFIG.player.startY,
      targetX: CONFIG.player.startX,
      targetY: CONFIG.player.startY,
      prevX: CONFIG.player.startX,
      prevY: CONFIG.player.startY,
      velocityX: 0,
      velocityY: 0,
      tilt: 0,
      sway: 0,
    };

    let lastFrameTime = performance.now();

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function damp(current, target, strength, dt) {
      return current + (target - current) * (1 - Math.exp(-strength * dt));
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve({ image, ok: true });
        image.onerror = () => resolve({ image: null, ok: false });
        image.src = src;
      });
    }

    async function loadAssets() {
      const result = await loadImage(PLAYER_SPRITES.jellyGirl.src);
      assets.playerImage = result.image;
      assets.playerImageReady = result.ok;
      assets.playerImageFailed = !result.ok;
    }

    function resizeCanvas() {
      viewport.dpr = window.devicePixelRatio || 1;
      viewport.cssWidth = window.innerWidth;
      viewport.cssHeight = window.innerHeight;
      canvas.width = Math.floor(viewport.cssWidth * viewport.dpr);
      canvas.height = Math.floor(viewport.cssHeight * viewport.dpr);
      canvas.style.width = `${viewport.cssWidth}px`;
      canvas.style.height = `${viewport.cssHeight}px`;
      updateViewport();
    }

    function updateViewport() {
      viewport.scale = Math.min(
        viewport.cssWidth / CONFIG.world.width,
        viewport.cssHeight / CONFIG.world.height,
      );
      viewport.viewWidth = CONFIG.world.width * viewport.scale;
      viewport.viewHeight = CONFIG.world.height * viewport.scale;
      viewport.offsetX = (viewport.cssWidth - viewport.viewWidth) / 2;
      viewport.offsetY = (viewport.cssHeight - viewport.viewHeight) / 2;
    }

    function screenToWorld(clientX, clientY) {
      return {
        x: (clientX - viewport.offsetX) / viewport.scale,
        y: (clientY - viewport.offsetY) / viewport.scale,
      };
    }

    function setPlayerTargetFromPointer(event) {
      const world = screenToWorld(event.clientX, event.clientY);
      input.worldX = world.x;
      input.worldY = world.y;

      const halfW = CONFIG.player.spriteWidth / 2;
      const halfH = CONFIG.player.spriteHeight / 2;
      player.targetX = clamp(world.x, halfW, CONFIG.world.width - halfW);
      player.targetY = clamp(world.y - CONFIG.player.pointerOffsetY, halfH, CONFIG.world.height - halfH);
    }

    function setupInput() {
      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        input.isDown = true;
        input.pointerId = event.pointerId;
        canvas.setPointerCapture(event.pointerId);
        setPlayerTargetFromPointer(event);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!input.isDown || event.pointerId !== input.pointerId) return;
        event.preventDefault();
        setPlayerTargetFromPointer(event);
      });

      const releasePointer = (event) => {
        if (event.pointerId !== input.pointerId) return;
        event.preventDefault();
        input.isDown = false;
        input.pointerId = null;
      };

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("lostpointercapture", () => {
        input.isDown = false;
        input.pointerId = null;
      });
    }

    function update(dt) {
      updatePlayer(dt);
    }

    function updatePlayer(dt) {
      player.prevX = player.x;
      player.prevY = player.y;

      player.x = damp(player.x, player.targetX, CONFIG.player.followStrength, dt);
      player.y = damp(player.y, player.targetY, CONFIG.player.followStrength, dt);

      const halfW = CONFIG.player.spriteWidth / 2;
      const halfH = CONFIG.player.spriteHeight / 2;
      player.x = clamp(player.x, halfW, CONFIG.world.width - halfW);
      player.y = clamp(player.y, halfH, CONFIG.world.height - halfH);

      player.velocityX = (player.x - player.prevX) / Math.max(dt, 0.0001);
      player.velocityY = (player.y - player.prevY) / Math.max(dt, 0.0001);

      const desiredTilt = clamp(
        player.velocityX * CONFIG.player.tiltFromVelocity,
        -CONFIG.player.maxTiltRad,
        CONFIG.player.maxTiltRad,
      );
      player.tilt = damp(player.tilt, desiredTilt, CONFIG.player.tiltResponsiveness, dt);

      const desiredSway = clamp(
        -player.velocityX * CONFIG.player.swayStrength * 0.01,
        -1,
        1,
      );
      player.sway = damp(player.sway, desiredSway, CONFIG.player.swayResponsiveness, dt);
    }

    function render() {
      ctx.setTransform(viewport.dpr, 0, 0, viewport.dpr, 0, 0);
      ctx.clearRect(0, 0, viewport.cssWidth, viewport.cssHeight);
      drawOuterArea();

      ctx.save();
      ctx.translate(viewport.offsetX, viewport.offsetY);
      ctx.scale(viewport.scale, viewport.scale);
      ctx.beginPath();
      ctx.rect(0, 0, CONFIG.world.width, CONFIG.world.height);
      ctx.clip();

      drawFieldBackground();
      drawPlayerSway();
      drawPlayer();
      if (CONFIG.debug.showHitCircle) drawHitCircle();

      ctx.restore();
      drawFieldBorder();
    }

    function drawOuterArea() {
      ctx.fillStyle = CONFIG.colors.outerFill;
      ctx.fillRect(0, 0, viewport.cssWidth, viewport.cssHeight);
    }

    function drawFieldBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.world.height);
      gradient.addColorStop(0, CONFIG.colors.fieldTop);
      gradient.addColorStop(1, CONFIG.colors.fieldBottom);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, CONFIG.world.width, CONFIG.world.height);

      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#d8f1ff";
      for (let i = 0; i < 28; i += 1) {
        const x = (i * 47) % CONFIG.world.width;
        const y = (i * 83) % CONFIG.world.height;
        const radius = 0.8 + (i % 3) * 0.45;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPlayerSway() {
      const baseY = player.y + 22;
      const starts = [-24, -14, -5, 6, 16, 25];

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      starts.forEach((startX, index) => {
        const side = startX < 0 ? -1 : 1;
        const length = 44 + (index % 3) * 10;
        const sway = player.sway * (12 + index * 1.4);
        const x = player.x + startX;
        const y = baseY + Math.abs(startX) * 0.18;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(
          x + sway * 0.55 - side * 5,
          y + length * 0.32,
          x + sway + side * 5,
          y + length * 0.68,
          x + sway * 0.35,
          y + length,
        );
        ctx.strokeStyle = index % 2 === 0 ? CONFIG.colors.sway : CONFIG.colors.swayAccent;
        ctx.lineWidth = 2.2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x + sway * 0.35, y + length, 3.2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(232, 242, 255, 0.55)";
        ctx.fill();
      });

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.tilt);

      const shouldDrawImage = assets.playerImageReady && !PLAYER_SPRITES.jellyGirl.isPlaceholder;
      if (shouldDrawImage) {
        ctx.drawImage(
          assets.playerImage,
          -CONFIG.player.spriteWidth / 2,
          -CONFIG.player.spriteHeight / 2,
          CONFIG.player.spriteWidth,
          CONFIG.player.spriteHeight,
        );
      } else {
        drawFallbackPlayer();
      }

      ctx.restore();
    }

    function drawFallbackPlayer() {
      // 本番画像未設定でも操作感を見られるよう、この子の配色に寄せた簡易シルエットを描く。
      const w = CONFIG.player.spriteWidth;
      const h = CONFIG.player.spriteHeight;

      ctx.save();
      ctx.shadowColor = "rgba(130, 175, 255, 0.35)";
      ctx.shadowBlur = 8;

      const hairGradient = ctx.createLinearGradient(0, -h * 0.48, 0, -h * 0.12);
      hairGradient.addColorStop(0, "#d9f4ff");
      hairGradient.addColorStop(1, "#7fbdf3");
      ctx.fillStyle = hairGradient;
      ctx.beginPath();
      ctx.ellipse(0, -h * 0.31, w * 0.32, h * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#7b75d7";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = "rgba(246, 244, 255, 0.92)";
      ctx.beginPath();
      ctx.moveTo(-w * 0.24, -h * 0.1);
      ctx.quadraticCurveTo(0, -h * 0.2, w * 0.24, -h * 0.1);
      ctx.lineTo(w * 0.16, h * 0.14);
      ctx.quadraticCurveTo(0, h * 0.2, -w * 0.16, h * 0.14);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      const skirtGradient = ctx.createLinearGradient(0, h * 0.04, 0, h * 0.34);
      skirtGradient.addColorStop(0, "#d9f2ff");
      skirtGradient.addColorStop(1, "#8bbdf7");
      ctx.fillStyle = skirtGradient;
      ctx.beginPath();
      ctx.moveTo(-w * 0.42, h * 0.08);
      ctx.quadraticCurveTo(0, h * 0.28, w * 0.42, h * 0.08);
      ctx.quadraticCurveTo(w * 0.32, h * 0.34, 0, h * 0.31);
      ctx.quadraticCurveTo(-w * 0.32, h * 0.34, -w * 0.42, h * 0.08);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "rgba(105, 155, 229, 0.82)";
      ctx.lineWidth = 3;
      [-9, 9].forEach((legX) => {
        ctx.beginPath();
        ctx.moveTo(legX, h * 0.26);
        ctx.lineTo(legX, h * 0.47);
        ctx.stroke();
      });

      ctx.fillStyle = "#9bd2ff";
      [-10, 10].forEach((shoeX) => {
        ctx.beginPath();
        ctx.ellipse(shoeX, h * 0.5, 6, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });

      ctx.restore();
    }

    function drawHitCircle() {
      const hitX = player.x + CONFIG.player.hitOffsetX;
      const hitY = player.y + CONFIG.player.hitOffsetY;
      ctx.save();
      ctx.beginPath();
      ctx.arc(hitX, hitY, CONFIG.player.hitRadius, 0, Math.PI * 2);
      ctx.fillStyle = CONFIG.colors.hitFill;
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = CONFIG.colors.hitStroke;
      ctx.stroke();
      ctx.restore();
    }

    function drawFieldBorder() {
      ctx.save();
      ctx.setTransform(viewport.dpr, 0, 0, viewport.dpr, 0, 0);
      ctx.strokeStyle = CONFIG.colors.fieldBorder;
      ctx.lineWidth = 1;
      ctx.strokeRect(
        viewport.offsetX + 0.5,
        viewport.offsetY + 0.5,
        viewport.viewWidth - 1,
        viewport.viewHeight - 1,
      );
      ctx.restore();
    }

    function gameLoop(now) {
      const rawDt = (now - lastFrameTime) / 1000;
      const dt = Math.min(rawDt, 1 / 30);
      lastFrameTime = now;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    async function init() {
      document.documentElement.style.setProperty("--page-bg", CONFIG.colors.pageBackground);
      resizeCanvas();
      setupInput();
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("orientationchange", resizeCanvas);
      await loadAssets();
      lastFrameTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
